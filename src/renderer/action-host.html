<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUMA Action</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101012;
        --ink: #ffffff;
        --muted: rgba(255, 255, 255, 0.68);
        --line: rgba(255, 255, 255, 0.14);
        --accent: #b8ff2c;
        --danger: #ff6b6b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: "DM Sans", "Inter", "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        min-height: 100%;
        align-content: center;
        gap: 12px;
        padding: 22px;
      }

      p {
        margin: 0;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 11px;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.1;
      }

      #detail {
        min-height: 18px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        line-height: 1.35;
      }

      #detail.error {
        color: var(--danger);
      }

      button {
        justify-self: start;
        min-width: 92px;
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--ink);
        font: inherit;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">LUMA Action</p>
      <h1>Cargando Action...</h1>
      <p id="detail">Preparando la ventana.</p>
      <button id="close" type="button">Cerrar</button>
    </main>

    <script src="./action-host.js"></script>
  </body>
</html>

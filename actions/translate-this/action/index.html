<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Translate This</title>
    <style>
      html, body { width: 100%; min-height: 100%; margin: 0; overflow: hidden; background: #0d0d0f; color: #fff; }
    </style>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="translator" aria-label="Translate This">
      <header>
        <p>Translate This</p>
        <label class="language-picker" aria-label="Idioma de destino">
          <select id="language">
            <option value="en" selected>EN</option>
            <option value="es">ES</option>
            <option value="pt">PT</option>
            <option value="fr">FR</option>
            <option value="it">IT</option>
            <option value="de">DE</option>
            <option value="ja">JA</option>
          </select>
        </label>
      </header>

      <section class="workarea">
        <textarea id="source" rows="3" maxlength="4000" spellcheck="true" autofocus></textarea>
        <button id="translate" type="button">Traducir</button>
        <output id="result" aria-live="polite"></output>
      </section>

      <p id="status" role="status"></p>
    </main>

    <script src="./action.js"></script>
  </body>
</html>

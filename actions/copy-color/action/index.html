<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copiar color</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="action-shell">
      <section class="panel">
        <div class="preview" id="preview" aria-hidden="true"></div>
        <div class="content">
          <h1>Copiar color</h1>
          <p id="status">Selecciona un color de la pantalla.</p>
          <div class="result-row">
            <input id="hex" value="#FFFFFF" aria-label="Color HEX" readonly />
            <button id="copy" type="button">Copiar</button>
          </div>
          <button id="pick" class="primary" type="button">Activar gotero</button>
        </div>
      </section>
    </main>
    <script src="./action.js"></script>
  </body>
</html>
